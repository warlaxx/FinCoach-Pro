spring.application.name=fincoach-api
server.port=8080

# H2 Database (dev - replace with PostgreSQL in prod)
spring.datasource.url=jdbc:h2:file:./data/fincoach;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# OpenAI (set your key via env variable OPENAI_API_KEY)
openai.api.key=${OPENAI_API_KEY:demo}

# CORS is configured in CorsConfig.java (needed at Spring Security level)

# =====================================================================
# JWT — our app token issued after successful OAuth2 login
# IMPORTANT: set JWT_SECRET to a random Base64 256-bit string in production
# Generate one with: openssl rand -base64 32
# =====================================================================
jwt.secret=${JWT_SECRET:ZmluY29hY2gtcHJvLWp3dC1zZWNyZXQta2V5LWZvci1kZXZlbG9wbWVudA==}
jwt.expiration=86400000

# =====================================================================
# OAuth2 Providers
# Set the env vars matching the provider you want to use.
# The app starts fine with zero, one, or all three configured.
# =====================================================================

# --- Google ---
# Create credentials at: https://console.developers.google.com/
# Authorized redirect URI: http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# --- Microsoft ---
# Create an app at: https://portal.azure.com/ > App registrations
# Authorized redirect URI: http://localhost:8080/login/oauth2/code/microsoft
spring.security.oauth2.client.registration.microsoft.client-id=${MICROSOFT_CLIENT_ID:}
spring.security.oauth2.client.registration.microsoft.client-secret=${MICROSOFT_CLIENT_SECRET:}

# --- Apple ---
# Requires an Apple Developer account ($99/year)
# Create a Services ID at: https://developer.apple.com/account/resources/identifiers/list/serviceId
# Authorized redirect URI: http://localhost:8080/login/oauth2/code/apple
# APPLE_CLIENT_ID    = your Services ID (e.g. com.example.fincoach)
# APPLE_TEAM_ID      = your 10-char Team ID
# APPLE_KEY_ID       = your 10-char Key ID
# APPLE_PRIVATE_KEY  = full content of the .p8 file (including BEGIN/END headers)
spring.security.oauth2.client.registration.apple.client-id=${APPLE_CLIENT_ID:}
apple.team-id=${APPLE_TEAM_ID:}
apple.key-id=${APPLE_KEY_ID:}
apple.private-key=${APPLE_PRIVATE_KEY:}

# Frontend URL used by OAuth2SuccessHandler to redirect after login
app.frontend-url=${FRONTEND_URL:http://localhost:4200}

# Logging is fully configured in logback-spring.xml (daily rolling files + console)
