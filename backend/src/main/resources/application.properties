spring.application.name=fincoach-api
server.port=8080

# =====================================================================
# PostgreSQL DataSource
# Credentials injected from environment variables / docker-compose .env
# =====================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fincoach}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:fincoach}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:fincoach}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Flyway manages the schema — Hibernate must NOT touch DDL
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# =====================================================================
# Flyway — automatic versioned migrations on startup
# Migration scripts: src/main/resources/db/migration/V*.sql
# =====================================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# =====================================================================
# Spring Mail — for email verification
# Set MAIL_HOST / MAIL_PORT / MAIL_USERNAME / MAIL_PASSWORD in .env
# When not configured, EmailService prints emails to the log instead.
# =====================================================================
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:resend}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

# OpenAI (set your key via env variable OPENAI_API_KEY)
openai.api.key=${OPENAI_API_KEY:demo}

# CORS is configured in CorsConfig.java (needed at Spring Security level)

# =====================================================================
# JWT — our app token issued after successful OAuth2 or email/password login
# IMPORTANT: set JWT_SECRET to a random Base64 256-bit string in production
# Generate one with: openssl rand -base64 32
# =====================================================================
jwt.secret=${JWT_SECRET:ZmluY29hY2gtcHJvLWp3dC1zZWNyZXQta2V5LWZvci1kZXZlbG9wbWVudA==}
jwt.expiration=86400000

# =====================================================================
# OAuth2 Providers
# Credentials are read directly from environment variables by SecurityConfig.
# Do NOT add spring.security.oauth2.client.registration.* here —
# Spring Boot's auto-config would validate them and crash on empty values.
# SecurityConfig builds the ClientRegistrationRepository programmatically.
# =====================================================================
apple.team-id=${APPLE_TEAM_ID:}
apple.key-id=${APPLE_KEY_ID:}
apple.private-key=${APPLE_PRIVATE_KEY:}

# Frontend URL used by OAuth2SuccessHandler to redirect after login
app.frontend-url=${FRONTEND_URL:http://localhost:4200}

# Logging is fully configured in logback-spring.xml (daily rolling files + console)
