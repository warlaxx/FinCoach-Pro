spring.application.name=fincoach-api
server.port=8080

# H2 Database (dev - replace with PostgreSQL in prod)
spring.datasource.url=jdbc:h2:file:./data/fincoach;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# OpenAI (set your key via env variable OPENAI_API_KEY)
openai.api.key=${OPENAI_API_KEY:demo}

# CORS
spring.mvc.cors.allowed-origins=http://localhost:4200

# Logging
# INFO in production - set to DEBUG locally to see detailed calculation logs
logging.level.com.fincoach=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
