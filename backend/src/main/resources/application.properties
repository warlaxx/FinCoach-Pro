spring.application.name=fincoach-api
server.port=8080

# H2 Database (dev - replace with PostgreSQL in prod)
spring.datasource.url=jdbc:h2:file:./data/fincoach;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# OpenAI (set your key via env variable OPENAI_API_KEY)
openai.api.key=${OPENAI_API_KEY:demo}

# CORS is configured in CorsConfig.java (needed at Spring Security level)

# =====================================================================
# JWT — our app token issued after successful OAuth2 login
# IMPORTANT: set JWT_SECRET to a random Base64 256-bit string in production
# Generate one with: openssl rand -base64 32
# =====================================================================
jwt.secret=${JWT_SECRET:ZmluY29hY2gtcHJvLWp3dC1zZWNyZXQta2V5LWZvci1kZXZlbG9wbWVudA==}
jwt.expiration=86400000

# =====================================================================
# OAuth2 Providers
# Credentials are read directly from environment variables by SecurityConfig.
# Do NOT add spring.security.oauth2.client.registration.* here —
# Spring Boot's auto-config would validate them and crash on empty values.
# SecurityConfig builds the ClientRegistrationRepository programmatically.
# =====================================================================
apple.team-id=${APPLE_TEAM_ID:}
apple.key-id=${APPLE_KEY_ID:}
apple.private-key=${APPLE_PRIVATE_KEY:}

# Frontend URL used by OAuth2SuccessHandler to redirect after login
app.frontend-url=${FRONTEND_URL:http://localhost:4200}

# Logging is fully configured in logback-spring.xml (daily rolling files + console)
