name: Claude BugBot

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "frontend/**/*.ts"
      - "frontend/**/*.html"
      - "frontend/**/*.scss"
      - "frontend/**/*.css"
      - "backend/**/*.java"
      - "backend/**/*.yml"
      - "backend/**/*.yaml"
      - ".github/**/*.yml"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude-bugbot:
    name: Claude — BugBot Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude BugBot
        uses: rekpero/claude-bugbot-github-action@v1.0.9
        with:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
