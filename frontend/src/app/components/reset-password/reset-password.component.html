<div class="reset-page">

  <div class="reset-card">

    <!-- Logo -->
    <div class="reset-logo">
      <span class="logo-icon">💰</span>
      <div>
        <div class="logo-name">FinCoach</div>
        <div class="logo-sub">PRO</div>
      </div>
    </div>

    <!-- Icon -->
    <div class="icon-wrapper">
      <div class="icon-bg">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
      </div>
    </div>

    <ng-container *ngIf="!success; else successBlock">

      <h1 class="reset-title">Nouveau mot de passe</h1>
      <p class="reset-text">
        Choisissez un nouveau mot de passe pour votre compte.
      </p>

      <div class="reset-error" *ngIf="error">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ error }}
      </div>

      <form class="reset-form" (ngSubmit)="onSubmit()" novalidate *ngIf="token">

        <div class="form-group">
          <label for="newPassword">Nouveau mot de passe</label>
          <div class="input-with-toggle">
            <input
              id="newPassword"
              [type]="showPassword ? 'text' : 'password'"
              name="newPassword"
              [(ngModel)]="newPassword"
              placeholder="Minimum 8 caractères"
              required
              autocomplete="new-password"
            />
            <button type="button" class="toggle-pw" (click)="showPassword = !showPassword" tabindex="-1">
              <svg *ngIf="!showPassword" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showPassword" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmer le mot de passe</label>
          <div class="input-with-toggle">
            <input
              id="confirmPassword"
              [type]="showConfirm ? 'text' : 'password'"
              name="confirmPassword"
              [(ngModel)]="confirmPassword"
              placeholder="Retapez le mot de passe"
              required
              autocomplete="new-password"
            />
            <button type="button" class="toggle-pw" (click)="showConfirm = !showConfirm" tabindex="-1">
              <svg *ngIf="!showConfirm" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showConfirm" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-submit" [disabled]="loading || !newPassword || !confirmPassword">
          <svg *ngIf="loading" class="spin" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
          </svg>
          {{ loading ? 'Réinitialisation…' : 'Réinitialiser le mot de passe' }}
        </button>

      </form>

    </ng-container>

    <ng-template #successBlock>
      <div class="success-icon-wrapper">
        <div class="success-icon-bg">
          <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
        </div>
      </div>

      <h1 class="reset-title">Mot de passe modifié !</h1>
      <p class="reset-text">
        Votre mot de passe a été réinitialisé avec succès.
        Vous allez être redirigé vers la page de connexion…
      </p>
    </ng-template>

    <p class="reset-link">
      <a routerLink="/login">Retour à la connexion</a>
    </p>

  </div>

  <!-- Decorative background -->
  <div class="reset-bg">
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
  </div>

</div>
