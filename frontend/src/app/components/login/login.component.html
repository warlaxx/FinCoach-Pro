<div class="login-page">

  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <span class="logo-icon">💰</span>
      <div>
        <div class="logo-name">FinCoach</div>
        <div class="logo-sub">PRO</div>
      </div>
    </div>

    <h1 class="login-title">Bienvenue</h1>
    <p class="login-subtitle">
      Connectez-vous pour accéder à votre tableau de bord financier personnalisé.
    </p>

    <!-- Error message from failed OAuth2 -->
    <div class="login-error" *ngIf="errorMessage">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ errorMessage }}
    </div>

    <!-- OAuth2 buttons -->
    <div class="login-buttons">

      <!-- Google -->
      <button class="btn-provider btn-google"
              (click)="loginWith('google')"
              [disabled]="!!loading">
        <span class="provider-icon" *ngIf="loading !== 'google'">
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
        </span>
        <span class="provider-spinner" *ngIf="loading === 'google'">
          <svg class="spin" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
          </svg>
        </span>
        <span>Continuer avec Google</span>
      </button>

      <!-- Microsoft -->
      <button class="btn-provider btn-microsoft"
              (click)="loginWith('microsoft')"
              [disabled]="!!loading">
        <span class="provider-icon" *ngIf="loading !== 'microsoft'">
          <svg width="20" height="20" viewBox="0 0 24 24">
            <rect x="1" y="1" width="10" height="10" fill="#F35325"/>
            <rect x="13" y="1" width="10" height="10" fill="#81BC06"/>
            <rect x="1" y="13" width="10" height="10" fill="#05A6F0"/>
            <rect x="13" y="13" width="10" height="10" fill="#FFBA08"/>
          </svg>
        </span>
        <span class="provider-spinner" *ngIf="loading === 'microsoft'">
          <svg class="spin" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
          </svg>
        </span>
        <span>Continuer avec Microsoft</span>
      </button>

      <!-- Apple -->
      <button class="btn-provider btn-apple"
              (click)="loginWith('apple')"
              [disabled]="!!loading">
        <span class="provider-icon" *ngIf="loading !== 'apple'">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
          </svg>
        </span>
        <span class="provider-spinner" *ngIf="loading === 'apple'">
          <svg class="spin" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
          </svg>
        </span>
        <span>Continuer avec Apple</span>
      </button>

    </div>

    <p class="login-note">
      En vous connectant, vous acceptez que vos données soient traitées uniquement
      pour personnaliser votre coaching financier.
    </p>

  </div>

  <!-- Decorative background -->
  <div class="login-bg">
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
  </div>

</div>
