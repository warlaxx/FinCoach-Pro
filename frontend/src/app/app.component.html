<!-- Galaxy Three.js background (always on) -->
<app-galaxy-bg />

<!-- Page warp transition overlay -->
<app-page-transition />

<!-- Full-screen layout for auth/public pages (no sidebar) -->
<ng-container *ngIf="!showSidebar">
  <router-outlet />
</ng-container>

<!-- App shell with sidebar for authenticated pages -->
<div class="app-shell" *ngIf="showSidebar">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <app-logo [size]="38" />
      <div>
        <div class="logo-name">FinCoach</div>
        <div class="logo-sub">Pro</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>Tableau de bord</span>
      </a>

      <a routerLink="/actions" routerLinkActive="active" class="nav-item">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 11l3 3L22 4" />
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" />
        </svg>
        <span>Plan d'actions</span>
      </a>

      <a routerLink="/chat" routerLinkActive="active" class="nav-item">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
        </svg>
        <span>Assistant IA</span>
        <span class="nav-badge">IA</span>
      </a>

      <a routerLink="/settings" routerLinkActive="active" class="nav-item">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
        <span>Paramètres</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <img *ngIf="currentUser?.picture" [src]="currentUser!.picture"
             class="user-avatar user-avatar-img" [alt]="currentUser!.name" />
        <div *ngIf="!currentUser?.picture" class="user-avatar">
          {{ getAvatarLetter() }}
        </div>
        <div class="user-details">
          <div class="user-name">{{ currentUser?.name ?? 'Chargement...' }}</div>
          <div class="user-email">{{ currentUser?.email ?? '' }}</div>
        </div>
        <button class="btn-logout" (click)="logout()" title="Se déconnecter">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <router-outlet />
  </main>
</div>
