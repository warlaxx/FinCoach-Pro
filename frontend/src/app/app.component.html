<!-- Full-screen layout for login/callback pages (no sidebar) -->
<ng-container *ngIf="!showSidebar">
  <router-outlet />
</ng-container>

<!-- App shell with sidebar for authenticated pages -->
<div class="app-shell" *ngIf="showSidebar">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">💰</span>
      <div>
        <div class="logo-name">FinCoach</div>
        <div class="logo-sub">Pro</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" /><rect x="3" y="14" width="7" height="7" />
        </svg>
        <span>Tableau de bord</span>
      </a>

      <a routerLink="/actions" routerLinkActive="active" class="nav-item">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 11l3 3L22 4" />
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" />
        </svg>
        <span>Plan d'actions</span>
      </a>

      <a routerLink="/chat" routerLinkActive="active" class="nav-item">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
        </svg>
        <span>Assistant IA</span>
        <span class="nav-badge">IA</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <!-- Show provider picture (Google/Microsoft) if available, otherwise show initial -->
        <img *ngIf="currentUser?.picture" [src]="currentUser!.picture"
             class="user-avatar user-avatar-img" [alt]="currentUser!.name" />
        <div *ngIf="!currentUser?.picture" class="user-avatar">
          {{ getAvatarLetter() }}
        </div>
        <div class="user-details">
          <div class="user-name">{{ currentUser?.name ?? 'Chargement...' }}</div>
          <div class="user-email">{{ currentUser?.email ?? '' }}</div>
        </div>
        <!-- Logout button -->
        <button class="btn-logout" (click)="logout()" title="Se déconnecter">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <router-outlet />
  </main>
</div>
