<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="38%" cy="32%" r="72%" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="64" y2="64">
      <stop offset="0%"   stop-color="#1E1155"/>
      <stop offset="55%"  stop-color="#0E0B2E"/>
      <stop offset="100%" stop-color="#060410"/>
    </radialGradient>
    <linearGradient id="fT" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%"   stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="fR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="fL" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3730A3"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="gld" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FEF3C7"/>
      <stop offset="40%"  stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <filter id="gw">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <ellipse cx="20" cy="22" rx="16" ry="10" fill="#7C3AED" opacity="0.08"/>
  <ellipse cx="46" cy="42" rx="14" ry="9"  fill="#06B6D4" opacity="0.07"/>
  <circle cx="9"  cy="9"  r="0.6" fill="white" opacity="0.8"/>
  <circle cx="54" cy="7"  r="0.5" fill="white" opacity="0.6"/>
  <circle cx="59" cy="46" r="0.5" fill="white" opacity="0.5"/>
  <circle cx="6"  cy="54" r="0.6" fill="#93C5FD" opacity="0.7"/>
  <circle cx="50" cy="57" r="0.5" fill="#C4B5FD" opacity="0.5"/>
  <!-- 3D gem -->
  <polygon points="32,16 17,30 17,44 32,44" fill="url(#fL)"/>
  <polygon points="32,16 47,30 47,44 32,44" fill="url(#fR)"/>
  <polygon points="32,16 47,30 32,38 17,30" fill="url(#fT)"/>
  <line x1="32" y1="16" x2="47" y2="30" stroke="rgba(103,232,249,0.65)" stroke-width="0.7"/>
  <line x1="32" y1="16" x2="17" y2="30" stroke="rgba(196,181,253,0.5)"  stroke-width="0.7"/>
  <circle cx="32" cy="16" r="1.4" fill="#FEF3C7" opacity="0.9" filter="url(#gw)"/>
  <text x="32" y="36" text-anchor="middle" dominant-baseline="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="11" font-weight="900" fill="url(#gld)" filter="url(#gw)">$</text>
  <circle cx="47" cy="30" r="1" fill="white" opacity="0.55" filter="url(#gw)"/>
