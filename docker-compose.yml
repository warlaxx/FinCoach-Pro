# Docker Compose v2 no longer needs a top-level `version` key (it is obsolete
# and emits a warning), so it has been removed.

services:

  # ─── Database (PostgreSQL) ────────────────────────────────────────────────
  # Bundled so `docker compose up` works out of the box with no external DB.
  # The SQL migrations in backend/migrations are applied automatically on the
  # first startup (empty volume) via docker/init-db.sh.
  # Using your own managed Postgres instead? Set DATABASE_URL in the root .env
  # and this service can be ignored.
  postgres:
    image: postgres:16-alpine
    container_name: fincoach-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fincoach}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fincoach}
      POSTGRES_DB: ${POSTGRES_DB:-fincoach}
    # Port not published to the host on purpose: the backend reaches Postgres
    # over the internal compose network (postgres:5432), and NOT publishing it
    # avoids a clash if you already run Postgres on 5432 locally. To inspect the
    # DB from your host, uncomment the mapping below (use 5433 if 5432 is taken):
    # ports:
    #   - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/migrations:/migrations:ro
      - ./backend/docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fincoach} -d ${POSTGRES_DB:-fincoach}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - fincoach-net

  # ─── Backend (Express + TypeScript) ──────────────────────────────────────
  backend:
    env_file:
      # Root .env is optional: the individual variables below already have
      # sensible defaults, so `docker compose up` won't hard-fail if it's missing.
      - path: .env
        required: false
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fincoach-backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # ── Database ──────────────────────────────────────────────────────────────
      # Option A (recommended): set DATABASE_URL directly in your .env file.
      #   DATABASE_URL=postgresql://user:pass@host:5432/fincoach
      # Option B (backward compat): keep SPRING_DATASOURCE_* — the backend
      #   auto-converts them to DATABASE_URL on startup.
      # docker-compose does NOT support nested variable substitution so we pass
      # each variable individually and let database.ts resolve the URL.
      # DATABASE_URL is read from the root .env by docker-compose.
      # Defaults to the bundled `postgres` service above. Override in the root
      # .env to point at an external/managed database. (If you change
      # POSTGRES_USER/PASSWORD/DB, set a matching DATABASE_URL too.)
      - DATABASE_URL=${DATABASE_URL:-postgresql://fincoach:fincoach@postgres:5432/fincoach}
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL:-}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME:-fincoach}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD:-fincoach}
      # App secrets
      - JWT_SECRET=${JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-demo}
      # OAuth2
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID:-}
      - APPLE_TEAM_ID=${APPLE_TEAM_ID:-}
      - APPLE_KEY_ID=${APPLE_KEY_ID:-}
      - APPLE_PRIVATE_KEY=${APPLE_PRIVATE_KEY:-}
      # Mail (optional — emails are logged to console if not configured)
      - MAIL_HOST=${MAIL_HOST:-}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      # URLs
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:4200}
      - BACKEND_URL=${BACKEND_URL:-http://localhost:8080}
      - NODE_ENV=${NODE_ENV:-production}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - fincoach-net

  # ─── Frontend (Angular + Nginx) ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fincoach-frontend
    ports:
      - "4200:4200"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fincoach-net

networks:
  fincoach-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local