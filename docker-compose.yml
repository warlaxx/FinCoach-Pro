# Docker Compose v2 no longer needs a top-level `version` key (it is obsolete
# and emits a warning), so it has been removed.

services:

  # ─── Backend (Express + TypeScript) ──────────────────────────────────────
  backend:
    env_file:
      # Root .env is optional: the individual variables below already have
      # sensible defaults, so `docker compose up` won't hard-fail if it's missing.
      - path: .env
        required: false
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fincoach-backend
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # ── Database ──────────────────────────────────────────────────────────────
      # Option A (recommended): set DATABASE_URL directly in your .env file.
      #   DATABASE_URL=postgresql://user:pass@host:5432/fincoach
      # Option B (backward compat): keep SPRING_DATASOURCE_* — the backend
      #   auto-converts them to DATABASE_URL on startup.
      # docker-compose does NOT support nested variable substitution so we pass
      # each variable individually and let database.ts resolve the URL.
      # DATABASE_URL is read from the root .env by docker-compose.
      # Use host.docker.internal (not localhost) in the root .env for Docker:
      #   DATABASE_URL=postgresql://user:pass@host.docker.internal:5432/fincoach
      - DATABASE_URL=${DATABASE_URL:-}
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL:-}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME:-fincoach}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD:-fincoach}
      # App secrets
      - JWT_SECRET=${JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-demo}
      # OAuth2
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID:-}
      - APPLE_TEAM_ID=${APPLE_TEAM_ID:-}
      - APPLE_KEY_ID=${APPLE_KEY_ID:-}
      - APPLE_PRIVATE_KEY=${APPLE_PRIVATE_KEY:-}
      # Mail (optional — emails are logged to console if not configured)
      - MAIL_HOST=${MAIL_HOST:-}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      # URLs
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:4200}
      - BACKEND_URL=${BACKEND_URL:-http://localhost:8080}
      - NODE_ENV=${NODE_ENV:-production}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - fincoach-net

  # ─── Frontend (Angular + Nginx) ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fincoach-frontend
    ports:
      - "4200:4200"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fincoach-net

networks:
  fincoach-net:
    driver: bridge