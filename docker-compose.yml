version: '3.9'

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fincoach-backend
    ports:
      - "8080:8080"
    environment:
      # Docker Compose reads .env automatically from the project root
      # All variables below are injected from that file (or from the shell environment)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-demo}
      - JWT_SECRET=${JWT_SECRET:-ZmluY29hY2gtcHJvLWp3dC1zZWNyZXQta2V5LWZvci1kZXZlbG9wbWVudA==}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID:-}
      - APPLE_TEAM_ID=${APPLE_TEAM_ID:-}
      - APPLE_KEY_ID=${APPLE_KEY_ID:-}
      - APPLE_PRIVATE_KEY=${APPLE_PRIVATE_KEY:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:4200}
      - SPRING_PROFILES_ACTIVE=default
    volumes:
      - fincoach-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/dashboard/health-check", "||", "exit", "0"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - fincoach-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fincoach-frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - fincoach-net

volumes:
  fincoach-data:

networks:
  fincoach-net:
    driver: bridge
